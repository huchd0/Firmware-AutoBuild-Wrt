name: Auto-ImmortalWrt-x86_64-终极备份与扩容版

on:
  workflow_dispatch:
    inputs:
      # ====== 基础设定 ======
      luci_version:
        description: "选择版本 (Auto 智能抓取)"
        required: false
        default: "Auto"
        type: choice
        options: [ 'Auto', '24.10.5', '25.12.0-rc1' ]
      custom_router_ip:
        description: "路由器管理 IP"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: '核心系统(sda2)最终扩容容量 (MB)'
        required: true
        default: '10240'
        
      # ====== 核心功能勾选 ======
      include_docker:
        description: "🐳 集成 Docker 引擎"
        type: boolean
        default: true
      app_homeproxy:
        description: "🛡️ 集成 HomeProxy"
        type: boolean
        default: true
      app_ksmbd:
        description: "📁 集成 KSMBD (高速共享)"
        type: boolean
        default: true
      theme_argon:
        description: "🎨 集成 Argon 主题"
        type: boolean
        default: true

      # ====== 扩展工具 (根据需要在 UI 勾选) ======
      app_openclash:
        description: "🔌 集成 OpenClash"
        type: boolean
        default: false
      app_alist:
        description: "🗂️ 集成 AList"
        type: boolean
        default: false
      app_qbittorrent:
        description: "🧲 集成 qBittorrent"
        type: boolean
        default: false
      app_statistics:
        description: "📊 集成图形化监控"
        type: boolean
        default: true
      app_tailscale:
        description: "🕸️ 集成 Tailscale"
        type: boolean
        default: false

      # ====== 实体网卡驱动 (默认开启 Intel 2.5G) ======
      kmod_igc:
        description: "🔌 驱动: Intel i225/i226"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INPUT_VERSION: ${{ github.event.inputs.luci_version }}
      INPUT_IP: ${{ github.event.inputs.custom_router_ip }}
      INPUT_ROOTFS: ${{ github.event.inputs.rootfs_size }}
      
      # 映射变量
      INCLUDE_DOCKER: ${{ github.event.inputs.include_docker }}
      APP_HOMEPROXY: ${{ github.event.inputs.app_homeproxy }}
      APP_OPENCLASH: ${{ github.event.inputs.app_openclash }}
      APP_KSMBD: ${{ github.event.inputs.app_ksmbd }}
      THEME_ARGON: ${{ github.event.inputs.theme_argon }}
      APP_ALIST: ${{ github.event.inputs.app_alist }}
      APP_QBITTORRENT: ${{ github.event.inputs.app_qbittorrent }}
      APP_STATISTICS: ${{ github.event.inputs.app_statistics }}
      APP_TAILSCALE: ${{ github.event.inputs.app_tailscale }}
      KMOD_IGC: ${{ github.event.inputs.kmod_igc }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 设置脚本执行权限
        run: |
          sed -i 's/\r$//' ${{ github.workspace }}/x86-64/auto-build-script.sh
          chmod +x ${{ github.workspace }}/x86-64/auto-build-script.sh

      - name: 解析智能版本号
        id: resolve_version
        run: |
          if [ "$INPUT_VERSION" == "Auto" ]; then
            TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=x86-64-openwrt-" | jq -r '.results[].name' | grep -v "SNAPSHOT" | head -n 1 | sed 's/x86-64-openwrt-//')
            echo "FINAL_VERSION=$TAG" >> $GITHUB_ENV
          else
            echo "FINAL_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          fi

      - name: 执行编译
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/x86-64/auto-build-script.sh:/home/build/immortalwrt/build.sh" \
            -e CUSTOM_IP="$INPUT_IP" \
            -e ROOTFS_SIZE="$INPUT_ROOTFS" \
            -e INCLUDE_DOCKER="$INCLUDE_DOCKER" \
            -e APP_HOMEPROXY="$APP_HOMEPROXY" \
            -e APP_OPENCLASH="$APP_OPENCLASH" \
            -e APP_KSMBD="$APP_KSMBD" \
            -e THEME_ARGON="$THEME_ARGON" \
            -e APP_ALIST="$APP_ALIST" \
            -e APP_QBITTORRENT="$APP_QBITTORRENT" \
            -e APP_STATISTICS="$APP_STATISTICS" \
            -e APP_TAILSCALE="$APP_TAILSCALE" \
            -e KMOD_IGC="$KMOD_IGC" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.FINAL_VERSION }} /bin/bash /home/build/immortalwrt/build.sh

      - name: 发布固件到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Build-${{ env.FINAL_VERSION }}
          name: ImmortalWrt ${{ env.FINAL_VERSION }} 实体机稳定版
          body: |
            ## 🚀 固件技术特性
            * **底层架构**：采用 `ext4` 文件系统，支持全盘原生读写与在线扩容。
            * **空间分配**：首次开机时，系统盘 (`sda2`) 会自动扩容至 **${{ env.INPUT_ROOTFS }}MB**；剩余物理硬盘空间将自动划分为 `sda3` 数据盘并挂载至 `/opt`，确保重刷固件时数据持久化。
            
            ## 📡 网络默认配置
            * **管理地址**：`${{ env.INPUT_IP }}`
            * **默认账户**：`root`
            * **默认密码**：无 (初次进入请自行设置)

            ## 🛠️ 系统恢复指引 (重要)
            **由于本固件采用 `ext4` 全盘可写架构，系统后台原生的“恢复出厂设置”按钮不可用且无效。** 但我们已内置了专属的备份与恢复机制：
            
            开机初始化时，系统已自动将纯净的配置文件备份至 `/opt/backup/` 目录。当系统配置出错导致无法联网时，请按以下步骤操作：
            1. **进入终端**：使用 SSH 或网页版 TTYD 终端登录路由器。
            2. **执行恢复命令**：在命令行中输入以下命令并回车：
               ```bash
               restore-factory
               ```
            3. **恢复流程**：系统将自动清理当前错误配置，提取初始纯净配置进行覆盖，随后自动重启即可恢复正常。*(存放在 /opt 里的 Docker 或下载数据不会被清除)*

          files: ${{ github.workspace }}/bin/targets/x86/64/*.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
