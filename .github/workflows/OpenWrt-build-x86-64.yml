name: OpenWrt-build-x86-64

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 版本(latest智能选择最新版本)'
        required: true
        default: 'latest'
        type: choice
        options:
          - 'latest'
          - '25.12.4'
          - '24.10.7'
      profile:
        description: 'RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址 (仅填IP，无需加掩码)'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🌟 暴力抓取绝对最新 OpenWrt 版本号
        id: get_version
        run: |
          INPUT_VER="${{ inputs.openwrt_version }}"
          if [ -z "$INPUT_VER" ] || [ "$INPUT_VER" == "latest" ]; then
            echo "检测到 latest 选项，正在绕过官方 API，暴力读取底层 Git 标签..."
            
            # 利用 Git 底层协议读取所有标签，纯数学排查最高版本！
            # 1. git ls-remote: 绕过所有 API 限速，直接向 OpenWrt 源码仓库要数据。
            # 2. grep: 严格过滤，彻底剔除带 rc 的测试版和非版本号的乱码。
            # 3. sort -V: Linux 神级命令“版本号排序”，自动把 25.x 排在 24.x 后面。
            # 4. tail -n 1: 无脑拿排在最后面的那个绝对最大值！
            LATEST_VER=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 | sed 's/v//')
            
            if [ -z "$LATEST_VER" ]; then
                echo "⚠️ 警告：极端网络异常导致抓取失败，触发保底机制！"
                LATEST_VER="25.12.4"
            fi
            
            echo "🎉 成功锁定全网绝对最高版本: $LATEST_VER"
            echo "OWRT_VERSION=$LATEST_VER" >> $GITHUB_ENV
          else
            echo "使用手动指定的版本: $INPUT_VER"
            echo "OWRT_VERSION=$INPUT_VER" >> $GITHUB_ENV
          fi

      - name: 安装 Ubuntu 原生编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd jq

      - name: 下载并解压 ImageBuilder
        run: |
          echo ">>> 正在下载 OpenWrt ${{ env.OWRT_VERSION }} 版本 <<<"
          wget -q https://downloads.openwrt.org/releases/${{ env.OWRT_VERSION }}/targets/x86/64/openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          mv openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64 imagebuilder

      - name: 运行定制脚本
        env:
          ROOTFS_SIZE: ${{ inputs.profile }}
          MANAGEMENT_IP: ${{ inputs.custom_ip }}
        run: |
          # 核心修复：强制清除网页复制粘贴带来的 Windows 回车符，防止脚本报错
          sed -i 's/\r$//' OpenWrt-build-x86-64-Deluxe.sh
          chmod +x OpenWrt-build-x86-64-Deluxe.sh
          cp OpenWrt-build-x86-64-Deluxe.sh imagebuilder/
          cd imagebuilder
          
          # 执行强大的自定义脚本
          ./OpenWrt-build-x86-64-Deluxe.sh

      - name: 生成版本标签
        id: tag
        run: echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

      - name: 发布到 Releases (发行版)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: OpenWrt ${{ env.OWRT_VERSION }} 定制版 [IP ${{ inputs.custom_ip }}]
          files: imagebuilder/output-firmware/*
          body: |
            **🎉 晓敏专属：OpenWrt ${{ env.OWRT_VERSION }} x86_64 终极定制版**
            
            ### 📥 固件下载
            > **⏬ 请直接滑动到本页面最底部的 `Assets` (资产) 区域，点击 `.img.gz` 结尾的文件即可高速下载！**
            
            ---
            
            **🚀 核心黑科技与特性：**
            - 🌐 **管理后台**: `http://${{ inputs.custom_ip }}` (智能识别单/多网口并自动分配 WAN/LAN)
            - 📦 **容量扩充**: `${{ inputs.profile }} MB` 系统空间，开机全自动无损挂载 `sda3` 数据大分区
            - 📶 **Wi-Fi 7 满血**: 注入 MT7925 官方底层固件，后台智能探测硬件路径，散发 `mywifi7` 信号并强制开启 WPA3/PMF
            - 🛡️ **核心插件**: 内置 OpenClash (预置 Meta 兼容版内核) 与 Argon 现代主题
            - 📊 **全能监控**: CPU、温度、传感器、双Ping (114/8.8.8.8)网络延迟数据全量开机自动激活并持久化到 硬盘sda3。
            - 🔄 **静默守护**: 独创双引擎自动升级策略，每隔一天凌晨 2:00 自动更新且避开底层内核，智能重启网络代理服务。

            **🛠️ 升级与维护指南：**
            - **手动触发升级**：通过 SSH 登录路由器，直接输入全局命令 `upg` 即可随时拉起安全升级流程。
            - **查看执行日志**：输入 `cat /root/upg.log` 可查看完整历史；输入 `tail -f /root/upg.log` 可帅气的实时跟踪滚动状态。
            - **取消自动升级**：若不需要后台定时升级，请登录路由器网页后台，进入 **系统 -> 计划任务**，删除 `0 2 */2 * * /usr/bin/upg` 这一行并点击提交即可。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成首页摘要与直达链接 (Job Summary)
        run: |
          echo "### 🎉 晓敏专属 OpenWrt x86_64 终极定制版编译成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🎯 核心参数：**" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **底层版本:** \`OpenWrt ${{ env.OWRT_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 **系统容量:** \`${{ inputs.profile }} MB\` (内置 sda3 智能无损扩容)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 **管理后台:** \`http://${{ inputs.custom_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📶 **满血特性:** \`注入 MT7925 Wi-Fi 7 固件 & WPA3/PMF 强制开启\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **静默守护:** \`内置双引擎自动安全升级机制\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **下载入口:** 👉 [**点击直达 Release 获取固件**](https://github.com/${{ github.repository }}/releases/tag/${{ env.release_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
